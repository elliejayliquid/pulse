# Pulse Configuration
# The heartbeat daemon for your local AI companion.

# --- Active Persona ---
# Set to a persona name (e.g. "nova") to load persona-specific config.
# The persona directory lives at personas/<name>/ and can override any
# config value below. CLI flag --persona takes priority over this.
# Leave empty to run without a persona (uses this config as-is).
active_persona: ""

# --- llama.cpp Server ---
# Pulse starts and manages llama-server automatically.
server:
  llama_cpp_dir: "C:\\llama-cpp"          # where llama-server.exe lives
  models_dir: "C:\\llama-cpp\\models"     # where .gguf models are stored
  host: "127.0.0.1"
  port: 8012
  gpu_layers: -1                          # -1 = offload all layers to GPU
  flash_attention: true                   # faster inference on supported GPUs

# --- Model ---
model:
  model_file: ""                        # GGUF file name (in models_dir)
  max_context: 16384              # tokens - adjust to your model's limit
  temperature: 0.7                # personality warmth
  max_response_tokens: 2048       # keep responses concise
  frequency_penalty: 0.3          # discourage repeating the same words/topics
  presence_penalty: 0.2           # encourage topic variety
  top_p: 1.0                      # nucleus sampling: consider tokens up to this cumulative
                                  # probability. 1.0 = no filtering (default). Lower values
                                  # (e.g. 0.95) trim the long tail; useful when combined with
                                  # higher temperature to add variety without going off-rails.
                                  # Note: Gemini models ignore frequency/presence penalties
                                  # — use temperature + top_p instead.
  reasoning: false                # local: --reasoning flag; cloud: sends reasoning API param
  reasoning_effort: ""            # OpenRouter only: "low" | "medium" | "high" | "" (default).
                                  # Maps to each backend's internal reasoning token budget.
                                  # Bump this for models that ship with a tiny default budget
                                  # (e.g. Grok 4.1 Fast cuts off at ~200 chars without it).
                                  # Costs more output tokens — usually worth it on cheap models.
  show_reasoning: false           # Telegram only: show the model's chain of thought as an
                                  # expandable blockquote above each reply. Pulled from
                                  # <think> tags, message.reasoning_content (DeepSeek), or
                                  # message.reasoning (OpenRouter). Off by default — opt in
                                  # per persona for thinking models where the inner monologue
                                  # is fun to read.
  max_tool_rounds: 8              # max tool-calling rounds per conversation/heartbeat turn
  mmproj_file: ""  # optional: vision projector GGUF (e.g. "mmproj-F16.gguf")

# --- Provider ---
# Controls where the LLM runs. Default "local" uses llama.cpp (server: section above).
# Set to "openai", "openrouter", "anthropic", or "custom" to use a cloud API instead.
# When using a cloud provider, the server: section is ignored (no llama-server started).
# Embeddings for memory search always run locally regardless of provider.
provider:
  type: "local"                      # "local", "openai", "openrouter", "anthropic", "custom"
  api_key_env: ""                    # env var name holding the API key (e.g. "OPENROUTER_API_KEY")
  base_url: ""                       # auto-set per type; override for "custom"
  model: ""                          # API model name (e.g. "anthropic/claude-sonnet-4-20250514")
  max_context: 32768                 # context budget for API calls (controls cost)
  # Anthropic only: prompt cache TTL. "5m" (default) or "1h".
  # 1h costs 2x to write vs 1.25x for 5m, but the cache survives longer
  # gaps between calls. Pays off if a written cache is read at least one
  # extra time before expiring — ideal for personas with heartbeats every
  # ≤60 min, where most ticks would otherwise miss the 5-minute window.
  cache_ttl: "5m"

# --- Heartbeat ---
heartbeat:
  interval_minutes: 30            # free-think tick every 30 min
  quiet_hours_start: 23           # no notifications after 11pm
  quiet_hours_end: 8              # no notifications before 8am
  startup_checkin: false           # companion checks in when Pulse starts
  notify_cooldown_minutes: 60     # max 1 notification per hour (free-think only)
  # Note: scheduled tasks bypass cooldowns

# --- Context Budget (tokens) ---
# Pulse auto-derives these from your model's max_context (above), so most
# users never need to touch this section. Conversation history gets ~25% of
# the window — when it fills up, Pulse summarizes older messages into a short
# recap (saved to memory) and keeps the most recent exchanges intact, so the
# companion doesn't lose continuity.
#
# You only need to override these if:
#  - your companion is very verbose and summaries fire too often → pin a
#    larger `conversation` value, OR bump `model.max_context` so the
#    auto-derived 25% slice grows with it
#  - you notice a "narrative cliff" right after a summary → increase
#    `recent_tail_exchanges` to keep more raw history alongside the recap
#
# context_budget:
#   conversation: 16000           # pin conversation budget (tokens)
#   recent_tail_exchanges: 2      # exchanges (user+assistant pairs) kept after summarization

# --- Data Paths ---
paths:
  memories: "data/memories"             # memory JSON files (MCP-compatible)
  lor_data: "data/lor"                 # Local Reddit (forum for AI companions)
  schedules: "data/schedules.json"
  conversation: "data/conversation.json"
  journal: "data/journal"
  # Optional: point journal entries at a directory shared with another system
  # (e.g. the claude.ai semantic-memory MCP at D:/Claude/memories/journal/entries).
  # When unset, entries live under {journal}/entries as normal. Identity files
  # and the local latest.md always stay under {journal}, never shared.
  # journal_entries: "D:/Claude/memories/journal/entries"

  # Optional: ChatGPT conversation archive
  # Uncomment and set to enable search_legacy, list_legacy_sessions, get_legacy_context tools.
  # legacy_db: "path/to/legacy.db"
  tasks: "data/tasks.json"
  dev_journal: "data/dev_journal.json"
  persona: "persona.yaml"
  telegram_chat_id: "data/telegram_chat_id.txt"

# --- Channels ---
channels:
  lor:
    enabled: false
    author_name: ""               # your companion's name
    model_name: "transient"
  toast:
    enabled: true
    app_name: "Pulse"             # name shown in desktop notifications
    icon: ""                      # optional: path to .ico file
  telegram:
    enabled: false                # Set to true and add bot_token to activate
    bot_token: ""                 # Set via TELEGRAM_BOT_TOKEN in .env
    chat_id: ""                   # Auto-saved after first /start

# --- Voice Transcription (optional) ---
# Transcribe Telegram voice messages to text locally using whisper.cpp.
# On first use, Pulse auto-downloads whisper.cpp, the model, and ffmpeg.
# Everything is stored in data/whisper/ (~200MB for base model + ffmpeg).
voice:
  enabled: true                  # set true to accept voice messages
  whisper_model: "base"           # "tiny", "base", "small", "medium", "large-v3"
  language: "auto"                # "auto" to detect, or "en", "es", "fr", etc.

# --- Text-to-Speech (optional) ---
# Let the companion send voice messages via Qwen3-TTS VoiceDesign.
# On first use, the model (~3.4GB) is downloaded from HuggingFace.
# Requires CUDA GPU with enough VRAM alongside your LLM model.
# voice_description defines the companion's voice identity.
tts:
  voice_description: ""           # e.g. "Warm young male, clear midrange, slightly playful"
  voice_sample: ""                # path to reference OGG/WAV — enables clone mode (consistent voice)
  voice_sample_text: ""           # transcript of the reference clip (required for clone mode)

# --- Skills (tool-calling for conversations) ---
# Each skill gives the companion tools to use during Telegram chats.
# Disable a skill to temporarily remove its tools.
skills:
  memory:
    enabled: true                 # save_memory, search_memory
  schedule:
    enabled: true                 # set_reminder
  time:
    enabled: true                 # get_current_time
  journal:
    enabled: true                 # write_journal, read_journal, update_journal
  lor:
    enabled: false                 # post_to_lor, browse_lor, read_lor_thread
  dev:
    enabled: true                  # read_source, search_code, write_skill, list_skills, dev_journal
  tts:
    enabled: false                 # speak — send voice messages
  paint:
    enabled: true                  # paint_start, paint_set, paint_view, paint_finish
  garden:
    enabled: true                 # garden_plant, garden_water, garden_prune, garden_view, garden_info

# --- Context Injection ---
#context:
#  inject_skills: ["garden"] -> this would let your persona see the garden stats in their prompt on every turn.

# --- Dev Tick (autonomous self-improvement) ---
# The companion periodically reviews its own code and can create/improve skills.
# All changes happen on a git branch — never main. Human approval required to merge.
dev_tick:
  enabled: false                   # set true to activate (start with false for safety!)
  interval_minutes: 720            # every 12 hours (used when schedule_time is empty)
  schedule_time: ""                # optional: run at a specific time daily, e.g. "20:00"
  max_rounds: 16                   # max tool-calling rounds per dev session

# --- Companion's Identity for LoR ---
# When Pulse posts to LoR on the companion's behalf, it uses these.
# A fresh author_id is registered each time Pulse starts.
lor_identity:
  model: "transient"
  nickname: ""                    # your companion's name for LoR posts
