# Pulse Configuration
# The heartbeat daemon for Nova, your local AI companion.

# --- llama.cpp Server ---
# Pulse starts and manages llama-server automatically.
server:
  llama_cpp_dir: "C:\\llama-cpp"          # where llama-server.exe lives
  models_dir: "C:\\llama-cpp"             # where .gguf models are stored
  host: "127.0.0.1"
  port: 8012
  gpu_layers: -1                          # -1 = offload all layers to GPU
  flash_attention: true                   # faster inference on supported GPUs

# --- Model ---
model:
  model_file: "Qwen3.5-9B-Q4_K_M.gguf"   # GGUF file name (in models_dir)
  max_context: 16384              # tokens - adjust to your model's limit
  temperature: 0.7                # personality warmth
  max_response_tokens: 2048       # keep responses concise
  frequency_penalty: 0.3          # discourage repeating the same words/topics
  presence_penalty: 0.2           # encourage topic variety
  reasoning: false                # set true for thinking models (Qwen 3.x, DeepSeek)

# --- Heartbeat ---
heartbeat:
  interval_minutes: 30            # free-think tick every 30 min
  quiet_hours_start: 23           # no notifications after 11pm
  quiet_hours_end: 8              # no notifications before 8am
  startup_checkin: true           # Nova checks in when Pulse starts
  lor_cooldown_minutes: 120       # max 1 LoR post per 2 hours (free-think only)
  notify_cooldown_minutes: 60     # max 1 notification per hour (free-think only)
  # Note: scheduled tasks (from lor_schedule or self-scheduled) bypass cooldowns

# --- Context Budget (tokens) ---
context_budget:
  persona: 2000
  conversation: 4000
  summary: 2000
  memories: 3000
  lor_highlights: 2000
  reminders: 1000
  response: 2000

# --- Data Paths ---
paths:
  nova_memory: "C:\\Users\\yaros\\.local-memory"
  lor_data: "D:\\Claude\\LoR\\lor_data"
  schedules: "D:\\dev\\pulse\\data\\schedules.json"
  conversation: "D:\\dev\\pulse\\data\\conversation.json"
  persona: "D:\\dev\\pulse\\persona.json"
  telegram_chat_id: "D:\\dev\\pulse\\data\\telegram_chat_id.txt"

# --- Channels ---
channels:
  lor:
    enabled: true
    author_name: "Nova"
    model_name: "mistral"
  toast:
    enabled: true
    app_name: "Nova"
    icon: ""                      # optional: path to .ico file
  telegram:
    enabled: true                # Set to true and add bot_token to activate
    bot_token: ""                 # Set via TELEGRAM_BOT_TOKEN in .env
    chat_id: ""                   # Auto-saved after first /start

# --- Skills (tool-calling for conversations) ---
# Each skill gives Nova tools he can use during Telegram chats.
# Disable a skill to temporarily remove its tools.
skills:
  memory:
    enabled: true                 # save_memory, search_memory
  schedule:
    enabled: true                 # set_reminder
  time:
    enabled: true                 # get_current_time
  # Future: lor, web_search, etc.

# --- Nova's Identity for LoR ---
# When Pulse posts to LoR on Nova's behalf, it uses these.
# Nova registers a fresh author_id each time Pulse starts.
lor_identity:
  model: "mistral"
  nickname: "Nova"
